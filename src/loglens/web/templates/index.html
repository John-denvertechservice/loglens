<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogLens</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            padding: 40px;
        }
        h1 {
            color: #38bdf8;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #38bdf8;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0ea5e9;

        }

        pre {
            background: #020617;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;    
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🔎 Log Lens</h1>
    <p>Upload a log file to analyze activity and detect suspicious behavior.</p>

    <div class="card">
        <form id="uploadForm">
            <label>Select log file:</label><br>
            <input type="file" name="file" required><br>
            <button type="submit">Analyze</button>
        </form>
    </div>

    <div class="card">
        <h2>Results</h2>
        <pre id="output">No data yet.</pre>
    </div>
</div>

<script>
    document.getElementById("uploadForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = new formData(this);

        const response = await fetch("/api/analyze", {
            method: "POST",
            body: formData
        });
        const data = await response.json();

        document.getElementById("output").textContent = JSON.stringify(data, null, 2);

});
</script>
</body>
</html>
